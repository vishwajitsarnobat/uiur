# database/docker-compose.yml
#
# Standalone database repository.
# Run from this directory: docker compose up -d --wait
# Or from project root with: ./db.sh up
#
# db_schema.sql is bind-mounted into /docker-entrypoint-initdb.d so it runs
# automatically the FIRST time the container initialises a fresh volume.
# It will NOT re-run on an existing volume -- use ./db.sh apply-schema for that.

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: uiur_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-ragdb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      # :ro  = read-only mount
      # :z   = SELinux relabel (required on Fedora/RHEL/CentOS, no-op elsewhere)
      - ./db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_data:
